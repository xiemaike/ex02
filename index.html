<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101c2c" />
    <meta name="description" content="BlockHaven，一款原创浏览器方块沙盒游戏。" />
    <title>BlockHaven · 方块岛</title>
  </head>
  <body>
    <div id="game"></div>

    <section id="start-screen" class="screen">
      <div class="brand-card">
        <p class="eyebrow">一座会呼吸的方块岛</p>
        <h1>BLOCK<span>HAVEN</span></h1>
        <p class="intro">采集、搭建、探索。每一次进入，岛屿都会等你继续完成它。</p>
        <button id="play-button" class="primary">进入世界 <span>→</span></button>
        <div class="controls-grid">
          <div><kbd>WASD</kbd><span>移动</span></div>
          <div><kbd>空格</kbd><span>跳跃</span></div>
          <div><kbd>左键</kbd><span>破坏</span></div>
          <div><kbd>右键</kbd><span>放置</span></div>
          <div><kbd>1–6</kbd><span>选方块</span></div>
          <div><kbd>F5</kbd><span>切换视角</span></div>
          <div><kbd>Esc</kbd><span>暂停</span></div>
        </div>
      </div>
      <p class="original-note">原创体素沙盒 · 无需登录 · 自动保存在浏览器</p>
    </section>

    <div id="hud" class="hidden">
      <div class="topbar glass">
        <div class="world-name"><i></i><strong>方块岛</strong><span>生存建造模式</span></div>
        <div class="top-actions">
          <button id="view-button" title="切换第一/第三人称">◉ <span id="view-label">第一人称</span></button>
          <button id="character-button" title="编辑角色">♟ <span id="character-name">探险家</span></button>
          <button id="day-button" title="切换时间">☀ <span id="time-label">白昼</span></button>
          <button id="save-button" title="保存进度">◆ 保存</button>
        </div>
      </div>
      <div id="toast">世界已保存</div>
      <div id="damage-flash"></div>
      <div class="survival-status glass">
        <div class="health-line"><span>生命</span><div class="health-track"><i id="health-fill"></i></div><strong id="health-text">100</strong></div>
        <div class="survival-meta"><span>◆ 晶体 <strong id="crystal-count">0</strong></span><span>♜ 怪物 <strong id="monster-count">0</strong></span></div>
      </div>
      <div id="crosshair"><span></span><span></span></div>
      <div class="status glass">
        <span>坐标</span><strong id="coords">0 / 0 / 0</strong>
        <div class="divider"></div>
        <span>已放置</span><strong id="placed-count">0</strong>
      </div>
      <div id="hotbar" class="hotbar glass"></div>
      <div class="hint">左键攻击/采集 · 滚轮切换方块</div>
    </div>

    <section id="pause-screen" class="screen hidden">
      <div class="pause-card glass">
        <p class="eyebrow">世界已暂停</p>
        <h2>方块岛还在等你</h2>
        <button id="resume-button" class="primary">继续探索</button>
        <button id="pause-character-button" class="secondary">编辑角色</button>
        <button id="reset-button" class="secondary">生成新世界</button>
      </div>
    </section>

    <section id="character-screen" class="screen hidden">
      <div class="character-builder glass">
        <div class="character-preview-wrap">
          <p class="eyebrow">你的方块探险家</p>
          <div id="character-preview" class="character-preview">
            <div class="pixel-hat"><b></b></div>
            <div class="pixel-hair"></div>
            <div class="pixel-hair-tail left"></div><div class="pixel-hair-tail right"></div>
            <div class="pixel-head"><i></i><i></i></div>
            <div class="pixel-body"></div>
            <div class="pixel-accent"></div>
            <div class="pixel-arm left"></div><div class="pixel-arm right"></div>
            <div class="pixel-leg left"></div><div class="pixel-leg right"></div>
          </div>
          <div class="preview-shadow"></div>
        </div>
        <div class="character-options">
          <p class="eyebrow">创建角色</p>
          <h2>选择你的动漫冒险形象</h2>
          <label class="field-label">角色预设</label>
          <div id="preset-options" class="preset-grid"></div>
          <label class="field-label" for="name-input">角色昵称</label>
          <input id="name-input" maxlength="12" value="探险家" autocomplete="off" />
          <div class="option-row">
            <span>肤色</span>
            <div id="skin-options" class="swatches"></div>
          </div>
          <div class="option-row">
            <span>上衣</span>
            <div id="shirt-options" class="swatches"></div>
          </div>
          <div class="option-row">
            <span>发色</span>
            <div id="hair-options" class="swatches"></div>
          </div>
          <button id="save-character-button" class="primary">保存角色并出发 <span>→</span></button>
          <button id="cancel-character-button" class="text-button">返回游戏</button>
        </div>
      </div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
